matches:

  - trigger: ":aicmd"
    replace: "{{output}}"
    vars:
      - name: question
        type: form
        params:
          layout: "Q:\n[[query]]"
          fields:
            query:
              multiline: true
      - name: output
        type: shell
        params:
          shell: cmd
          cmd: |
            echo {{question.query}} | az-ai --raw --system "You are az-ai."
