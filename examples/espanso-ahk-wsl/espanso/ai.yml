# ~/.config/espanso/match/ai.yml
# az-ai Espanso matches — Option A (Espanso running inside WSL).
#
# Design rules (do not weaken without reading the kit README §5.6):
#   * --raw on every invocation (no spinner, no stats, no trailing newline).
#   * stderr → /dev/null (defense-in-depth against spinner leakage).
#   * User text (clipboard or form) reaches az-ai via STDIN, never via
#     shell-interpolated args. Forms use a single-quoted heredoc so the body
#     is not expanded by the shell.
#   * Clipboard read uses a fallback chain: wl-paste → xclip → PowerShell.
#
# Since v2.1.1, az-ai auto-loads ~/.config/az-ai/env at startup (env vars
# that aren't already set). This means non-login-shell contexts (Espanso,
# cron, systemd) find credentials without a wrapper or profile hook.
#
# Expected latency: 2–3 s per trigger in steady state (Azure round-trip).
#
# Placeholder while processing ("yada yada yada"):
#   Each trigger first backspaces over the trigger text itself, then types a
#   visible placeholder into the active text field via xdotool. When the
#   response arrives, the placeholder is backspaced away and filler spaces
#   (equal to trigger length) are typed so Espanso's own trigger-deletion
#   backspaces land on padding instead of real content.
#
#   The backspace count uses ${#ph} so changing the placeholder string only
#   requires editing one line. $tl (trigger length) is set per-trigger.
#
#   Wayland note: xdotool does not work under Wayland compositors. Install
#   `wtype` (https://github.com/atx/wtype) and replace the two xdotool lines:
#     xdotool type --clearmodifiers "$ph"  -->  wtype "$ph"
#     xdotool key --repeat N BackSpace     -->  for i in $(seq 1 N); do wtype -k BackSpace; done

matches:

  # ── :ai <space> — free-form prompt via form, stdin-piped ───────────────
  # User types ":ai " → form pops → prompt → response replaces trigger.
  # The form body goes through a *quoted* heredoc (__AZ_AI_EOF__), so shell
  # metachars in the user's prompt are inert.
  - trigger: ":ai "
    replace: "{{output}}"
    vars:
      - name: form1
        type: form
        params:
          layout: "AI prompt:\n\n[[prompt]]"
          fields:
            prompt:
              multiline: true
      - name: output
        type: shell
        params:
          shell: bash
          cmd: |
            tl=4; ph='yada yada yada'
            xdotool key --repeat $tl BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$ph"
            response=$(az-ai --raw 2>/dev/null <<'__AZ_AI_EOF__'
            {{form1.prompt}}
            __AZ_AI_EOF__
            )
            xdotool key --repeat ${#ph} BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$(printf '%*s' $tl '')"
            sleep 0.05
            printf '%s' "$response"

  # ── :aifix — grammar/spelling fix on clipboard ─────────────────────────
  - trigger: ":aifix"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          shell: bash
          cmd: |
            tl=6; ph='yada yada yada'
            xdotool key --repeat $tl BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$ph"
            response=$({ wl-paste 2>/dev/null \
              || xclip -selection clipboard -o 2>/dev/null \
              || powershell.exe -NoProfile -Command Get-Clipboard 2>/dev/null; } \
            | tr -d '\r' \
            | az-ai --raw --max-tokens 500 --temperature 0.3 \
                --system 'Fix grammar and spelling. Preserve meaning, tone, and formatting. Output ONLY the corrected text, nothing else.' \
                2>/dev/null)
            xdotool key --repeat ${#ph} BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$(printf '%*s' $tl '')"
            sleep 0.05
            printf '%s' "$response"
  - trigger: ":aiexp"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          shell: bash
          cmd: |
            tl=6; ph='yada yada yada'
            xdotool key --repeat $tl BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$ph"
            response=$({ wl-paste 2>/dev/null \
              || xclip -selection clipboard -o 2>/dev/null \
              || powershell.exe -NoProfile -Command Get-Clipboard 2>/dev/null; } \
            | tr -d '\r' \
            | az-ai --raw --max-tokens 300 --temperature 0.4 \
                --system 'Explain the following clearly in 2-3 sentences. If it is code, be precise and technical. Output ONLY the explanation, no preamble.' \
                2>/dev/null)
            xdotool key --repeat ${#ph} BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$(printf '%*s' $tl '')"
            sleep 0.05
            printf '%s' "$response"

  # ── :aitldr — 2-sentence summary of clipboard ──────────────────────────
  - trigger: ":aitldr"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          shell: bash
          cmd: |
            tl=7; ph='yada yada yada'
            xdotool key --repeat $tl BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$ph"
            response=$({ wl-paste 2>/dev/null \
              || xclip -selection clipboard -o 2>/dev/null \
              || powershell.exe -NoProfile -Command Get-Clipboard 2>/dev/null; } \
            | tr -d '\r' \
            | az-ai --raw --max-tokens 150 --temperature 0.4 \
                --system 'Summarize in exactly 2 sentences. Be concise. Output ONLY the summary.' \
                2>/dev/null)
            xdotool key --repeat ${#ph} BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$(printf '%*s' $tl '')"
            sleep 0.05
            printf '%s' "$response"
  - trigger: ":airw"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          shell: bash
          cmd: |
            tl=5; ph='yada yada yada'
            xdotool key --repeat $tl BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$ph"
            response=$({ wl-paste 2>/dev/null \
              || xclip -selection clipboard -o 2>/dev/null \
              || powershell.exe -NoProfile -Command Get-Clipboard 2>/dev/null; } \
            | tr -d '\r' \
            | az-ai --raw --max-tokens 600 --temperature 0.5 \
                --system 'Rewrite the following in a more professional, polished tone. Preserve meaning and key facts. Do not add information. Output ONLY the rewritten text.' \
                2>/dev/null)
            xdotool key --repeat ${#ph} BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$(printf '%*s' $tl '')"
            sleep 0.05
            printf '%s' "$response"

  # ── :aic — code review on clipboard ────────────────────────────────────
  # Uses the 'reviewer' persona if squad is configured (see `az-ai --squad-init`).
  # Falls back to a plain --system prompt if persona isn't available —
  # az-ai exits non-zero for unknown personas, and the `||` branch kicks in.
  - trigger: ":aic"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          shell: bash
          cmd: |
            tl=4; ph='yada yada yada'
            xdotool key --repeat $tl BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$ph"
            CLIP="$( { wl-paste 2>/dev/null \
                       || xclip -selection clipboard -o 2>/dev/null \
                       || powershell.exe -NoProfile -Command Get-Clipboard 2>/dev/null; } \
                     | tr -d '\r' )"
            response=$( printf '%s' "$CLIP" \
              | az-ai --raw --persona reviewer --max-tokens 500 2>/dev/null \
              || printf '%s' "$CLIP" \
                 | az-ai --raw --max-tokens 500 --temperature 0.3 \
                     --system 'You are a senior code reviewer. Identify bugs, security issues, and design problems in the following code. Be concise, specific, and actionable. Use bullet points. Output ONLY the review.' \
                     2>/dev/null )
            xdotool key --repeat ${#ph} BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$(printf '%*s' $tl '')"
            sleep 0.05
            printf '%s' "$response"

  # -- Generate image (form prompt, copies to clipboard) ---------------
  - trigger: ":aiimg"
    replace: "{{output}}"
    vars:
      - name: form1
        type: form
        params:
          layout: "Image prompt:\n\n[[prompt]]"
          fields:
            prompt:
              multiline: true
      - name: output
        type: shell
        params:
          shell: bash
          cmd: |
            tl=6; ph='yada yada yada'
            xdotool key --repeat $tl BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$ph"
            b64=$( printf '%s' '{{form1.prompt}}' \
              | az-ai --image --raw 2>/dev/null )
            if [ -n "$b64" ]; then
              tmp="/tmp/az-ai-espanso-$$.png"
              printf '%s' "$b64" | base64 -d > "$tmp"
              xclip -selection clipboard -t image/png -i "$tmp" 2>/dev/null \
                || wl-copy --type image/png < "$tmp" 2>/dev/null
              result='[image copied to clipboard]'
            else
              result='[image generation failed]'
            fi
            xdotool key --repeat ${#ph} BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$(printf '%*s' $tl '')"
            sleep 0.05
            printf '%s' "$result"

  # POWER TRIGGERS -- complex text expansion, web search, structured output

  # -- :aiexpand -- expand/elaborate on clipboard content ---------------
  - trigger: ":aiexpand"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          shell: bash
          cmd: |
            tl=10; ph='yada yada yada'
            xdotool key --repeat $tl BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$ph"
            CLIP="$( { wl-paste 2>/dev/null \
                       || xclip -selection clipboard -o 2>/dev/null \
                       || powershell.exe -NoProfile -Command Get-Clipboard 2>/dev/null; } \
                     | tr -d '\r' )"
            response=$( printf '%s' "$CLIP" \
              | az-ai --raw --max-tokens 2000 --temperature 0.6 \
                  --system 'Take the following text and expand on it. Add relevant detail, context, and supporting points. Keep the same voice and intent but make it richer and more thorough. Do NOT pad with filler -- every sentence should add substance. Output ONLY the expanded text.' \
                  2>/dev/null )
            xdotool key --repeat ${#ph} BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$(printf '%*s' $tl '')"
            sleep 0.05
            printf '%s' "$response"

  # -- :aiweb -- web-augmented AI prompt with form ---------------------
  - trigger: ":aiweb "
    replace: "{{output}}"
    vars:
      - name: form1
        type: form
        params:
          layout: "Web-augmented AI prompt:\n\n[[prompt]]"
          fields:
            prompt:
              multiline: true
      - name: output
        type: shell
        params:
          shell: bash
          cmd: |
            tl=6; ph='searching the web...'
            xdotool key --repeat $tl BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$ph"
            response=$( printf '%s' '{{form1.prompt}}' \
              | az-ai --raw --agent --tools web --max-tokens 2000 --max-rounds 5 \
                  --system 'You have access to a web_fetch tool. Use it to search for current, accurate information relevant to the user prompt. Fetch 1-3 URLs as needed. Synthesize findings into a clear, well-structured answer. Cite sources inline with [Source Title](URL) format. Output ONLY the final answer -- no tool-call narration.' \
                  2>/dev/null )
            xdotool key --repeat ${#ph} BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$(printf '%*s' $tl '')"
            sleep 0.05
            printf '%s' "$response"

  # -- :aitone -- rewrite clipboard in chosen tone (form) --------------
  - trigger: ":aitone"
    replace: "{{output}}"
    vars:
      - name: form1
        type: form
        params:
          layout: "Rewrite clipboard text in this tone:\n\n[[tone]]"
          fields:
            tone:
              type: choice
              values:
                - Professional
                - Casual / Friendly
                - Academic / Formal
                - Concise / Direct
                - Enthusiastic
                - Diplomatic / Careful
                - Sarcastic
                - ELI5 (Explain Like I'm 5)
      - name: output
        type: shell
        params:
          shell: bash
          cmd: |
            tl=7; ph='yada yada yada'
            xdotool key --repeat $tl BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$ph"
            TONE='{{form1.tone}}'
            CLIP="$( { wl-paste 2>/dev/null \
                       || xclip -selection clipboard -o 2>/dev/null \
                       || powershell.exe -NoProfile -Command Get-Clipboard 2>/dev/null; } \
                     | tr -d '\r' )"
            response=$( printf '%s' "$CLIP" \
              | az-ai --raw --max-tokens 1000 \
                  --system "Rewrite the following text in a ${TONE} tone. Preserve the core meaning and all key facts. Adjust vocabulary, sentence structure, and register to match the requested tone. Output ONLY the rewritten text." \
                  2>/dev/null )
            xdotool key --repeat ${#ph} BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$(printf '%*s' $tl '')"
            sleep 0.05
            printf '%s' "$response"

  # -- :aibullets -- convert clipboard to bullet points ----------------
  - trigger: ":aibullets"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          shell: bash
          cmd: |
            tl=10; ph='yada yada yada'
            xdotool key --repeat $tl BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$ph"
            CLIP="$( { wl-paste 2>/dev/null \
                       || xclip -selection clipboard -o 2>/dev/null \
                       || powershell.exe -NoProfile -Command Get-Clipboard 2>/dev/null; } \
                     | tr -d '\r' )"
            response=$( printf '%s' "$CLIP" \
              | az-ai --raw --max-tokens 1000 --temperature 0.3 \
                  --system 'Convert the following text into a clean bullet-point list. Group related points under short bold headings if the content spans multiple topics. Each bullet should be one clear, complete thought. Use - for bullets. Output ONLY the bullet list.' \
                  2>/dev/null )
            xdotool key --repeat ${#ph} BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$(printf '%*s' $tl '')"
            sleep 0.05
            printf '%s' "$response"

  # -- :aidata -- extract structured data / key facts ------------------
  - trigger: ":aidata"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          shell: bash
          cmd: |
            tl=7; ph='yada yada yada'
            xdotool key --repeat $tl BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$ph"
            CLIP="$( { wl-paste 2>/dev/null \
                       || xclip -selection clipboard -o 2>/dev/null \
                       || powershell.exe -NoProfile -Command Get-Clipboard 2>/dev/null; } \
                     | tr -d '\r' )"
            response=$( printf '%s' "$CLIP" \
              | az-ai --raw --max-tokens 1000 --temperature 0.2 \
                  --system 'Extract all key facts, data points, names, dates, numbers, decisions, and action items from the following text. Present them as a structured list grouped by category (e.g. People, Dates, Decisions, Action Items, Numbers/Metrics). Use - for bullets. If a category has no entries, omit it. Output ONLY the extracted data.' \
                  2>/dev/null )
            xdotool key --repeat ${#ph} BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$(printf '%*s' $tl '')"
            sleep 0.05
            printf '%s' "$response"

  # -- :aiflip -- devil's advocate analysis ----------------------------
  - trigger: ":aiflip"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          shell: bash
          cmd: |
            tl=7; ph='yada yada yada'
            xdotool key --repeat $tl BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$ph"
            CLIP="$( { wl-paste 2>/dev/null \
                       || xclip -selection clipboard -o 2>/dev/null \
                       || powershell.exe -NoProfile -Command Get-Clipboard 2>/dev/null; } \
                     | tr -d '\r' )"
            response=$( printf '%s' "$CLIP" \
              | az-ai --raw --max-tokens 1000 --temperature 0.7 \
                  --system 'Play devils advocate on the following text. Identify the strongest counter-arguments, unstated assumptions, potential weaknesses, and alternative perspectives. Be intellectually honest -- not contrarian for its own sake. Structure as: Assumptions, Counter-arguments, Risks/Blind spots. Output ONLY the analysis.' \
                  2>/dev/null )
            xdotool key --repeat ${#ph} BackSpace
            sleep 0.05
            xdotool type --clearmodifiers "$(printf '%*s' $tl '')"
            sleep 0.05
            printf '%s' "$response"
