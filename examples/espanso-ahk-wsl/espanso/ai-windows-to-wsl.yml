            [System.Windows.Forms.SendKeys]::SendWait($ph)
            try {
              $bash = @'
            tr -d '\r' | az-ai --raw --max-tokens 500 --temperature 0.3 --system 'Fix grammar and spelling. Preserve meaning, tone, and formatting. Output ONLY the corrected text, nothing else.' 2>/dev/null
            '@
              Get-Clipboard -Raw | wsl.exe -e bash -lc $bash
            } finally {
              [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $ph.Length + '}')
              [System.Windows.Forms.SendKeys]::SendWait($trigger)
            }

