            [System.Windows.Forms.SendKeys]::SendWait($ph)
            try {
              $bash = @'
            tr -d '\r' | az-ai --raw --max-tokens 1000 --system 'Rewrite the following text in a {{form1.tone}} tone. Preserve the core meaning and all key facts. Adjust vocabulary, sentence structure, and register to match the requested tone. Output ONLY the rewritten text.' 2>/dev/null
            '@
              Get-Clipboard -Raw | wsl.exe -e bash -lc $bash
            } finally {
              [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $ph.Length + '}')
              [System.Windows.Forms.SendKeys]::SendWait($trigger)
            }

