            tr -d '\r' | az-ai --raw --max-tokens 2000 --temperature 0.6 --system 'Take the following text and expand on it. Add relevant detail, context, and supporting points. Keep the same voice and intent but make it richer and more thorough. Do NOT pad with filler -- every sentence should add substance. Output ONLY the expanded text.' 2>/dev/null
            '@
              Get-Clipboard -Raw | wsl.exe -e bash -lc $bash
            } finally {
              [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $ph.Length + '}')
              [System.Windows.Forms.SendKeys]::SendWait($trigger)
            }

