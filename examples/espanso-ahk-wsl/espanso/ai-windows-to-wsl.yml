          layout: "Rewrite clipboard text in this tone:\n\n[[tone]]"
          fields:
            tone:
              type: choice
              values:
                - Professional
                - Casual / Friendly
                - Academic / Formal
                - Concise / Direct
                - Enthusiastic
                - Diplomatic / Careful
                - Sarcastic
                - ELI5 (Explain Like I'm 5)
      - name: output
        type: shell
