            [System.Windows.Forms.SendKeys]::SendWait($ph)
            try {
              $bash = @'
            CLIP=$(cat | tr -d '\r')
            printf %s "$CLIP" | az-ai --raw --persona reviewer --max-tokens 500 2>/dev/null || printf %s "$CLIP" | az-ai --raw --max-tokens 500 --temperature 0.3 --system 'You are a senior code reviewer. Identify bugs, security issues, and design problems in the following code. Be concise, specific, and actionable. Use bullet points. Output ONLY the review.' 2>/dev/null
            '@
              Get-Clipboard -Raw | wsl.exe -e bash -lc $bash
            } finally {
              [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $ph.Length + '}')
              [System.Windows.Forms.SendKeys]::SendWait($trigger)
            }

  # -- :aiimg -- generate image (form prompt, copies to clipboard) -----
  # Uses --image --raw to get base64, decodes to temp PNG, copies image to
  # the Windows clipboard. Returns "[image copied to clipboard]" as the
  # replacement text so the trigger has a visible result.
  - trigger: ":aiimg"
    replace: "{{output}}"
    vars:
      - name: form1
        type: form
        params:
          layout: "Image prompt:\n\n[[prompt]]"
          fields:
            prompt:
              multiline: true
      - name: output
        type: shell
        params:
          shell: powershell
          cmd: |
            $OutputEncoding=[Text.UTF8Encoding]::new()
            [Console]::OutputEncoding=[System.Text.UTF8Encoding]::new()
            Add-Type -AssemblyName System.Windows.Forms
            $trigger = ':aiimg'
            $ph = 'yada yada yada'
            [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $trigger.Length + '}')
            [System.Windows.Forms.SendKeys]::SendWait($ph)
            try {
              $prompt = @'
            {{form1.prompt}}
            '@
              $bash = @'
            az-ai --image --raw 2>/dev/null
            '@
              $b64 = $prompt | wsl.exe -e bash -lc $bash
              if ($b64) {
                $tmp = [System.IO.Path]::Combine([System.IO.Path]::GetTempPath(), 'az-ai-espanso.png')
                [System.IO.File]::WriteAllBytes($tmp, [System.Convert]::FromBase64String($b64))
                Add-Type -AssemblyName System.Drawing
                $img = [System.Drawing.Image]::FromFile($tmp)
                [System.Windows.Forms.Clipboard]::SetImage($img)
                $img.Dispose()
                Write-Output '[image copied to clipboard]'
              } else {
                Write-Output '[image generation failed]'
              }
            } finally {
              [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $ph.Length + '}')
              [System.Windows.Forms.SendKeys]::SendWait($trigger)
            }

  # === POWER TRIGGERS ===================================================

  # -- :aiexpand -- expand/elaborate on clipboard content --------------
  - trigger: ":aiexpand"
