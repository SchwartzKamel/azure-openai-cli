            try {
              $bash = @'
            tr -d '\r' | az-ai --raw --max-tokens 400 --temperature 0.2 --system 'The clipboard contains a git diff. Write a Conventional Commits message for it. Format: type(scope): subject (under 72 chars, imperative mood), blank line, body explaining the WHY (wrap at 72). Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, security. Output ONLY the commit message, no fences or preamble.' 2>/dev/null
            '@
              Get-Clipboard -Raw | wsl.exe -e bash -lc $bash
            } finally {
              [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $ph.Length + '}')
              [System.Windows.Forms.SendKeys]::SendWait($trigger)
            }

  # -- :airegex -- describe-or-generate regex from clipboard -----------
  # Clipboard either: (a) a regex pattern -> explain it; or
  #                   (b) a natural-language description -> generate one.
  - trigger: ":airegex"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          shell: powershell
          cmd: |
            $OutputEncoding=[Text.UTF8Encoding]::new()
            [Console]::OutputEncoding=[System.Text.UTF8Encoding]::new()
            Add-Type -AssemblyName System.Windows.Forms
            $trigger = ':airegex'
            $ph = 'yada yada yada'
            [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $trigger.Length + '}')
            [System.Windows.Forms.SendKeys]::SendWait($ph)
            try {
              $bash = @'
            tr -d '\r' | az-ai --raw --max-tokens 600 --temperature 0.2 --system 'The clipboard is either a regex pattern OR a natural-language description of what to match. If it looks like a regex, explain it line-by-line and give 2-3 example matches and 1-2 non-matches. If it is a description, output a PCRE-compatible regex on one line, then a one-sentence explanation, then 2-3 example matches. Output ONLY the analysis or the regex + explanation.' 2>/dev/null
            '@
              Get-Clipboard -Raw | wsl.exe -e bash -lc $bash
            } finally {
              [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $ph.Length + '}')
              [System.Windows.Forms.SendKeys]::SendWait($trigger)
            }

  # -- :aianon -- redact PII in clipboard ------------------------------
  - trigger: ":aianon"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          shell: powershell
          cmd: |
            $OutputEncoding=[Text.UTF8Encoding]::new()
            [Console]::OutputEncoding=[System.Text.UTF8Encoding]::new()
            Add-Type -AssemblyName System.Windows.Forms
            $trigger = ':aianon'
            $ph = 'yada yada yada'
            [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $trigger.Length + '}')
            [System.Windows.Forms.SendKeys]::SendWait($ph)
            try {
              $bash = @'
            tr -d '\r' | az-ai --raw --max-tokens 1500 --temperature 0.1 --system 'Redact personally identifiable information in the following text. Replace with role-based placeholders: [PERSON_1], [PERSON_2], [EMAIL_1], [PHONE_1], [SSN], [DOB], [ADDRESS_1], [COMPANY_1], [URL_1], [IP_1]. Preserve all other content, structure, and formatting exactly. Be thorough -- catch names referenced indirectly (his, hers, etc) only when they would let a reader re-identify. Output ONLY the redacted text.' 2>/dev/null
            '@
              Get-Clipboard -Raw | wsl.exe -e bash -lc $bash
            } finally {
              [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $ph.Length + '}')
              [System.Windows.Forms.SendKeys]::SendWait($trigger)
            }

  # -- :aiq<space> -- quick one-liner question (no form, raw STDIN) ----
  # Faster than :ai<space> because it skips the form dialog. The text
  # AFTER `:aiq ` (until next whitespace word) becomes the prompt via a
  # single shell invocation. Best for short questions; use :ai<space>
  # for multiline.
  - trigger: ":aiq "
    replace: "{{output}}"
    vars:
      - name: form1
        type: form
        params:
          layout: "Quick question:\n\n[[q]]"
          fields:
            q:
              multiline: false
      - name: output
        type: shell
        params:
          shell: powershell
          cmd: |
            $OutputEncoding=[Text.UTF8Encoding]::new()
            [Console]::OutputEncoding=[System.Text.UTF8Encoding]::new()
            Add-Type -AssemblyName System.Windows.Forms
            $trigger = ':aiq '
            $ph = 'yada yada yada'
            [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $trigger.Length + '}')
            [System.Windows.Forms.SendKeys]::SendWait($ph)
            try {
              $prompt = @'
            {{form1.q}}
            '@
              $bash = @'
            az-ai --raw --max-tokens 200 --temperature 0.4 --system 'Answer in 1-2 short sentences. Be precise. No preamble.' 2>/dev/null
            '@
              $prompt | wsl.exe -e bash -lc $bash
            } finally {
              [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $ph.Length + '}')
              [System.Windows.Forms.SendKeys]::SendWait($trigger)
            }
