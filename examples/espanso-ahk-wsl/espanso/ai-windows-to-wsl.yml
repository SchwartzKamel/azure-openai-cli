# %APPDATA%\espanso\match\ai.yml
# az-ai Espanso matches -- Option B (Espanso on Windows, shells to WSL).
#
# Boundary layers to survive:  Espanso -> powershell.exe -> wsl.exe -> bash
#
# UNIFIED PATTERN (as of S02E39):
#   Every trigger uses `shell: powershell` with `cmd: |` (literal multiline)
#   and pipes a single-quoted PowerShell here-string `@'...'@` of pure bash
#   into `wsl.exe -e bash -lc`. The here-string is inert -- PowerShell does
#   no $-interpolation, no backtick escaping, no quote balancing inside it --
#   so the bash command is delivered to WSL exactly as written.
#
#   This replaced the older `shell: cmd` + `cmd: >` (folded) pattern that
#   relied on stacking cmd.exe / PowerShell / bash quote escapes (\" \\r ''
#   ...). That pattern was fragile: any future edit by a human or AI agent
#   could miscount escapes and produce TerminatorExpectedAtEndOfString
#   errors at runtime. See docs/exec-reports/s02e39 for the post-mortem.
#
# Rules:
#   * User text (form input or clipboard) reaches bash via STDIN only --
#     never as an argument -- so shell metachars are inert at every layer.
#   * `wsl.exe -e bash -lc "..."` runs a login shell so PATH includes
#     ~/.local/bin (where `make install` puts az-ai). Since v2.1.1, az-ai
#     auto-loads ~/.azureopenai-cli.json and ~/.config/az-ai/env at startup,
#     so credentials don't depend on shell init.
#   * stderr from the WSL side goes to /dev/null; only clean stdout reaches
#     Espanso.
#   * UTF-8 is forced for PowerShell output to avoid UTF-16 mojibake.
#
# YADA YADA YADA loading placeholder:
#   Each trigger fires `[Forms.SendKeys]::SendWait('yada yada yada')` before
#   the WSL call so the user sees instant feedback (Azure round-trip is ~3s).
#   The `finally` block backspaces the placeholder before Espanso writes the
#   real output.
#
#   IMPORTANT: at this stage Espanso has not yet done its own
#   "delete trigger text" step -- the cmd runs first, the replacement is
#   computed from its stdout, and only then does Espanso backspace the
#   trigger and type the result. So the trigger text (e.g. ':aifix') is
#   still on screen when SendKeys writes the placeholder, producing
#   visible junk like ':aifixyada yada yada'.
#
#   Each trigger therefore does:
#     1. backspace the trigger text away (using $trigger.Length)
#     2. type the placeholder ($ph)
#     3. run the WSL pipeline
#     4. backspace the placeholder (using $ph.Length)
#     5. RE-TYPE the trigger so Espanso's own delete-trigger step still
#        finds the expected text and the substitution lines up
#   This dance is the cost of using SendKeys for visual feedback before
#   Espanso's own injection sequence has run.
#
# ENCODING -- CRITICAL for non-ASCII text (CJK, Arabic, accented chars):
#   PowerShell 5.1 defaults $OutputEncoding to ASCII. When Get-Clipboard
#   pipes non-ASCII content to wsl.exe, those bytes become '???' unless
#   BOTH of these are set inside the PowerShell -Command string:
#     $OutputEncoding = [Text.UTF8Encoding]::new()   <-- pipe-to-native
#     [Console]::OutputEncoding = [Text.UTF8Encoding]::new()  <-- .NET stdout
#   PowerShell 7+ defaults to UTF-8 but setting both is harmless.
#
# Expected latency: ~3 s per trigger (Azure round-trip + ~30-90 ms WSL hop).

matches:

  # === FORM TRIGGERS (free-form prompt) =================================

  # -- :ai<space> -- free-form prompt via form ---------------------------
  - trigger: ":ai "
    replace: "{{output}}"
    vars:
      - name: form1
        type: form
        params:
          layout: "AI prompt:\n\n[[prompt]]"
          fields:
            prompt:
              multiline: true
      - name: output
        type: shell
        params:
          shell: powershell
          cmd: |
            $OutputEncoding=[Text.UTF8Encoding]::new()
            [Console]::OutputEncoding=[System.Text.UTF8Encoding]::new()
            Add-Type -AssemblyName System.Windows.Forms
            $trigger = ':ai '
            $ph = 'yada yada yada'
            [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $trigger.Length + '}')
            [System.Windows.Forms.SendKeys]::SendWait($ph)
            try {
              $prompt = @'
            {{form1.prompt}}
            '@
              $bash = @'
            az-ai --raw 2>/dev/null
            '@
              $prompt | wsl.exe -e bash -lc $bash
            } finally {
              [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $ph.Length + '}')
              [System.Windows.Forms.SendKeys]::SendWait($trigger)
            }

  # -- :aiweb<space> -- web-augmented AI prompt with form --------------
  - trigger: ":aiweb "
    replace: "{{output}}"
    vars:
      - name: form1
        type: form
        params:
          layout: "Web-augmented AI prompt:\n\n[[prompt]]"
          fields:
            prompt:
              multiline: true
      - name: output
        type: shell
        params:
          shell: powershell
          cmd: |
            $OutputEncoding=[Text.UTF8Encoding]::new()
            [Console]::OutputEncoding=[System.Text.UTF8Encoding]::new()
            Add-Type -AssemblyName System.Windows.Forms
            $trigger = ':aiweb '
            $ph = 'searching the web...'
            [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $trigger.Length + '}')
            [System.Windows.Forms.SendKeys]::SendWait($ph)
            try {
              $prompt = @'
            {{form1.prompt}}
            '@
              $bash = @'
            az-ai --raw --agent --tools web --max-tokens 2000 --max-rounds 5 --system 'You have access to a web_fetch tool. Use it to search for current, accurate information relevant to the user prompt. Fetch 1-3 URLs as needed. Synthesize findings into a clear, well-structured answer. Cite sources inline with [Source Title](URL) format. Output ONLY the final answer -- no tool-call narration.' 2>/dev/null
            '@
              $prompt | wsl.exe -e bash -lc $bash
            } finally {
              [System.Windows.Forms.SendKeys]::SendWait('{BACKSPACE ' + $ph.Length + '}')
              [System.Windows.Forms.SendKeys]::SendWait($trigger)
            }

  # === CLIPBOARD TRIGGERS (operate on Get-Clipboard) ====================

  # -- :aifix -- grammar/spelling fix on clipboard ---------------------
  - trigger: ":aifix"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          shell: powershell
          cmd: |
            $OutputEncoding=[Text.UTF8Encoding]::new()
            [Console]::OutputEncoding=[System.Text.UTF8Encoding]::new()
