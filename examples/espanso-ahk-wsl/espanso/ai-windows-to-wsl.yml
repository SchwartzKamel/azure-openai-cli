  # -- :aic -- code review on clipboard (persona, with fallback) -------
  - trigger: ":aic"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          shell: powershell
          cmd: |
            $OutputEncoding=[Text.UTF8Encoding]::new()
