name: 🧪 v2 bug report
description: Something in az-ai v2.0.x isn't working the way the docs say it should.
title: "[v2 bug]: "
labels: ["bug", "needs-triage", "v2"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a v2-specific bug. The dual-tree install window means v1 (`az-ai`) and v2 (`az-ai-v2`)
        run side by side — this template routes v2 bugs specifically so the right fleet archetype (Kramer on MAF,
        Newman on security, Bania on perf) picks it up fast.

        **If your bug reproduces on v1 too**, the regular [🐛 Bug report](./bug_report.yml) template is a better
        fit — that's an older issue, not a v2 regression.

        Please search [existing v2 issues](https://github.com/SchwartzKamel/azure-openai-cli/issues?q=is%3Aissue+label%3Av2)
        before filing.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the actual behavior under v2.
      placeholder: When I ran `az-ai-v2 chat`, it exited with code 1 and printed...
    validations:
      required: true

  - type: textarea
    id: what-expected
    attributes:
      label: What did you expect to happen?
      description: What should have happened instead? If this worked on v1, say so — v2 is byte-for-byte compatible by design, so regressions are high-priority.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, self-contained steps. Include commands, config snippets (redact secrets!), and input.
      placeholder: |
        1. Run `az-ai-v2 config init`
        2. Set `AZURE_OPENAI_ENDPOINT=...`
        3. Run `az-ai-v2 chat "hello"`
        4. Observe error
      render: shell
    validations:
      required: true

  - type: dropdown
    id: v2-version
    attributes:
      label: az-ai-v2 version
      description: Output of `az-ai-v2 --version --short`. If you're on a v2 pre-release, pick "other" and paste the exact string in the logs section.
      options:
        - 2.0.0
        - 2.0.1
        - 2.0.2
        - 2.0.3
        - 2.0.4
        - 2.0.5 (unreleased / from main)
        - 2.0.x (other — paste in logs)
        - 2.1.x (pre-release)
        - other
    validations:
      required: true

  - type: checkboxes
    id: also-on-v1
    attributes:
      label: Does this also reproduce on v1?
      description: |
        If you still have `az-ai` (v1) installed alongside `az-ai-v2`, please try the same command on v1 and tell us.
        This one checkbox saves hours of triage — a v2-only failure points at the MAF migration; a both-versions
        failure is an older issue.
      options:
        - label: I tried the same command on v1 (`az-ai`) and it **also** fails.
          required: false
        - label: I tried the same command on v1 (`az-ai`) and it **works** (v2 regression).
          required: false
        - label: I don't have v1 installed / can't easily test v1.
          required: false

  - type: dropdown
    id: os
    attributes:
      label: OS and architecture
      options:
        - Linux x64
        - Linux arm64
        - macOS Intel
        - macOS Apple Silicon
        - Windows x64
        - Other (describe in logs)
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: How did you install az-ai-v2?
      options:
        - make install
        - homebrew (schwartzkamel/tap/az-ai-v2)
        - scoop
        - nix
        - docker
        - built from source (AOT)
        - built from source (JIT / framework-dependent)
        - other
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area of v2 is this about?
      description: Best-guess is fine; Leo will re-label if needed.
      options:
        - MAF migration (chat / tool / streaming)
        - Persona routing (`--persona`, `.squad/`)
        - `--estimate` (offline cost prediction)
        - `--telemetry` / OpenTelemetry
        - `--prewarm` / startup
        - AOT / single-file binary
        - Packaging (brew / scoop / nix / docker)
        - Migration from v1 (side-by-side install, env vars, `.squad/`)
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: |
        Paste relevant output. Re-run with `--verbose` if possible. If `--telemetry` is on, include the
        stderr span output — it's extremely helpful for MAF issues.
        **Redact secrets, endpoints, and tokens before pasting.**
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues (including the `v2` label) and this is not a duplicate.
          required: true
        - label: I have redacted any API keys, endpoints, or other secrets from my report.
          required: true
        - label: I understand v1 (`az-ai`) continues to receive security patches through the dual-tree window and I am not blocked on a v2 migration.
          required: false
