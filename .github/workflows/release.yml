name: Release

on:
  push:
    tags: ['v*']

# Default to least privilege; individual jobs escalate only what they need.
permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  build-binaries:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for cosign/sigstore keyless signing via attest-build-provenance.
      id-token: write
      # Required to publish the provenance attestation alongside the artifact.
      attestations: write
    strategy:
      matrix:
        include:
          - rid: linux-x64
            name: azure-openai-cli-linux-x64
          - rid: linux-musl-x64
            name: azure-openai-cli-linux-musl-x64
          - rid: win-x64
            name: azure-openai-cli-win-x64
          - rid: osx-x64
            name: azure-openai-cli-osx-x64
          - rid: osx-arm64
            name: azure-openai-cli-osx-arm64
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Publish ${{ matrix.rid }}
        run: |
          dotnet publish azureopenai-cli/AzureOpenAI_CLI.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            /p:PublishSingleFile=true \
            /p:PublishTrimmed=true \
            /p:IncludeAllContentForSelfExtract=true \
            -o publish/${{ matrix.name }}

      - name: Package artifact
        run: |
          cd publish/${{ matrix.name }}
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            zip -r ../../${{ matrix.name }}.zip .
          else
            tar czf ../../${{ matrix.name }}.tar.gz .
          fi

      - name: Generate SBOM (CycloneDX)
        run: |
          dotnet tool install --global CycloneDX --version 4.0.2
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet CycloneDX azureopenai-cli/AzureOpenAI_CLI.csproj \
            --output . \
            --filename ${{ matrix.name }}.sbom.json \
            --json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: ${{ matrix.rid == 'win-x64' && format('{0}.zip', matrix.name) || format('{0}.tar.gz', matrix.name) }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.rid == 'win-x64' && format('{0}.zip', matrix.name) || format('{0}.tar.gz', matrix.name) }}
            ${{ matrix.name }}.sbom.json

  docker-publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for keyless signing of the published container image.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Attest image provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
          push-to-registry: true

  release:
    needs: [build-binaries, docker-publish]
    runs-on: ubuntu-latest
    permissions:
      # Creating/updating a GitHub Release requires write on contents.
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          pattern: azure-openai-cli-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sbom.json
          body: |
            ## Docker

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ## Binaries

            | Platform | File |
            |----------|------|
            | Linux (glibc) | `azure-openai-cli-linux-x64.tar.gz` |
            | Linux (musl/Alpine) | `azure-openai-cli-linux-musl-x64.tar.gz` |
            | Windows | `azure-openai-cli-win-x64.zip` |
            | macOS (Intel) | `azure-openai-cli-osx-x64.tar.gz` |
            | macOS (Apple Silicon) | `azure-openai-cli-osx-arm64.tar.gz` |
