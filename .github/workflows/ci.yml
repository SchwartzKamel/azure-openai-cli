name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  # One in-flight CI run per ref. PR pushes cancel older runs (cheap feedback
  # loop); `main` pushes do NOT cancel (we want every landed commit verified).
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # build-and-test: format-check, build, and both xUnit projects (v1 + v2) on
  # ubuntu + macos. Matrix runs in parallel (fail-fast: false — we want to see
  # all OS failures, not just the first one). Windows intentionally excluded
  # (see comment below); win-x64 build+smoke is covered in release.yml.
  build-and-test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # windows-latest temporarily excluded: 26 ToolHardening/SecurityTool
        # tests hard-code POSIX paths (/bin/sh, /etc/passwd, /root/.ssh/*).
        # Tracked for v1.9 as a cross-platform test-suite follow-up — the
        # cross-OS publish matrix in release.yml already covers win-x64 +
        # win-arm64 build + smoke-test for the shipped binaries.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Check code formatting
        # dotnet format --verify-no-changes is the canonical style gate. Must
        # match `make format-check` locally — divergence here is a CI bug, not
        # a contributor bug (see CONTRIBUTING.md "preflight gate").
        run: dotnet format --verify-no-changes azure-openai-cli.sln

      - name: Build
        # --no-restore reuses the cached NuGet restore from the previous step.
        run: dotnet build --no-restore --configuration Release

      - name: Test v1
        # Both v1 and v2 test projects are run as separate steps (not via the
        # solution file) so failures attribute cleanly to one tree. Local
        # `make test` uses the solution file — equivalent coverage, different
        # failure-attribution trade-off. See Puddy's make-test-both-trees note.
        run: dotnet test tests/AzureOpenAI_CLI.Tests/AzureOpenAI_CLI.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Test v2
        run: dotnet test tests/AzureOpenAI_CLI.V2.Tests/AzureOpenAI_CLI.V2.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Check for vulnerable packages
        # Advisory-only: continue-on-error so a newly-disclosed CVE doesn't
        # block `main` immediately. Real gate is Trivy in the docker job
        # below (HIGH/CRITICAL fail). See docs/security/scanners.md.
        shell: bash
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerability-report.txt
          if grep -qi "has the following vulnerable packages" vulnerability-report.txt; then
            echo "::warning::Vulnerable NuGet packages detected. Review vulnerability-report.txt"
          fi
        continue-on-error: true

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build CLI
        run: dotnet build --configuration Release

      - name: Run integration tests
        run: bash tests/integration_tests.sh

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          tags: azure-openai-cli:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image runs
        run: docker run --rm azure-openai-cli:ci --help

      - name: Scan image for vulnerabilities
        # Trivy is the AUTHORITATIVE scanner (see docs/security/scanners.md).
        # Aqua's DB; HIGH/CRITICAL severity threshold. Currently exit-code: 0
        # (advisory) while we stabilize the baseline — flip to exit-code: 1
        # once the v2.0.x CVE backlog is clean. Grype is the local-dev
        # convenience scanner (`make scan`); Trivy wins on disagreement.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 (only safe version)
        with:
          image-ref: 'azure-openai-cli:ci'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
