# docs-lint-ci — The Soup Nazi's line.
#
# Three audit-demanded rules + markdownlint standard hygiene.
# All three core rules ship WARN-ONLY on first run because the current tree
# red-lines on every one of them. See per-step TODOs to flip to fail.
#
# Owner: Soup Nazi. Coordination: Babu (i18n text), Elaine (docs), Jackie (legal).
name: docs-lint

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - '.markdownlint*'
      - '.github/workflows/docs-lint.yml'
    tags-ignore:
      - '**'
  pull_request:
    paths:
      - '**.md'
      - '.markdownlint*'
      - '.github/workflows/docs-lint.yml'

permissions:
  contents: read

concurrency:
  group: docs-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-lint:
    name: docs-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ----------------------------------------------------------------------
      # Rule 1: Smart-quote detection (Babu/Elaine)
      # Bans: U+2018 U+2019 U+201C U+201D U+2013 U+2014
      # HARD-FAIL since Wave 5 (Babu mega-sweep): docs-smart-quote-sweep
      # complete for in-scope *.md. Out-of-scope dirs (launch/, audits/, ...)
      # owned by other waves; excluded here until those land.
      # ----------------------------------------------------------------------
      - name: Smart-quote detection
        id: smart-quotes
        run: |
          set +e
          echo "::group::Smart-quote scan"
          # U+2018 '  U+2019 '  U+201C "  U+201D "  U+2013 -  U+2014 --
          HITS=$(grep -rn --include='*.md' \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=.smith \
            --exclude-dir=bin \
            --exclude-dir=obj \
            --exclude-dir=archive \
            --exclude-dir=perf \
            --exclude-dir=benchmarks \
            --exclude-dir=demos \
            --exclude-dir=launch \
            --exclude-dir=announce \
            --exclude-dir=talks \
            --exclude-dir=audits \
            --exclude=README.md \
            --exclude=CHANGELOG.md \
            -P '[\x{2018}\x{2019}\x{201C}\x{201D}\x{2013}\x{2014}]' . || true)
          if [ -n "$HITS" ]; then
            COUNT=$(printf '%s\n' "$HITS" | wc -l)
            echo "::error title=Smart quotes detected::$COUNT line(s) contain banned smart quotes/dashes"
            printf '%s\n' "$HITS" | while IFS= read -r line; do
              file=$(printf '%s' "$line" | cut -d: -f1)
              lineno=$(printf '%s' "$line" | cut -d: -f2)
              echo "::error file=${file#./},line=${lineno}::Smart quote or en/em dash -- use ASCII equivalents"
            done
            echo "::endgroup::"
            echo "smart_quote_hits=$COUNT" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "Clean: no smart quotes."
          echo "::endgroup::"
          echo "smart_quote_hits=0" >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------------------
      # Rule 2: Broken local link check (Elaine)
      # External links intentionally NOT checked (flaky networks).
      # HARD-FAIL since Wave 5 (Babu mega-sweep): docs-broken-link-sweep
      # complete under fence+inline-code-aware scan. Out-of-scope dirs
      # excluded until their owning waves land.
      # ----------------------------------------------------------------------
      - name: Broken local link check
        id: link-check
        run: |
          set +e
          echo "::group::Local link check"
          python3 - <<'PY'
          import os, re, sys
          broken = []
          SKIP_DIRS = {'.git', 'node_modules', '.smith', 'bin', 'obj', 'archive',
                       'perf', 'benchmarks', 'demos', 'launch', 'announce',
                       'talks', 'audits'}
          SKIP_FILES = {'README.md', 'CHANGELOG.md'}
          FENCE_RE = re.compile(r'^(\s*)(```+|~~~+)')
          INLINE_CODE_RE = re.compile(r'`[^`\n]*`')
          LINK_RE = re.compile(
              r'\[[^\]]*\]\((?!https?://|mailto:|tel:|#)([^)#\s]+)(#[^)]*)?\)'
          )
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in SKIP_DIRS]
              for f in files:
                  if not f.endswith('.md') or f in SKIP_FILES:
                      continue
                  p = os.path.join(root, f)
                  try:
                      with open(p, encoding='utf-8') as fh:
                          text = fh.read()
                  except Exception:
                      continue
                  in_fence = False
                  fence_marker = None
                  for i, line in enumerate(text.split('\n'), 1):
                      m = FENCE_RE.match(line)
                      if m:
                          marker = m.group(2)[:3]
                          if not in_fence:
                              in_fence = True
                              fence_marker = marker
                          elif line.lstrip().startswith(fence_marker):
                              in_fence = False
                              fence_marker = None
                          continue
                      if in_fence:
                          continue
                      line2 = INLINE_CODE_RE.sub('', line)
                      for mm in LINK_RE.finditer(line2):
                          tgt = mm.group(1).strip()
                          if not tgt or tgt.startswith('<'):
                              continue
                          resolved = os.path.normpath(
                              os.path.join(os.path.dirname(p), tgt)
                          )
                          if not os.path.exists(resolved):
                              broken.append((p, i, tgt))
          for p, i, t in broken:
              rel = p[2:] if p.startswith('./') else p
              print(f"::error file={rel},line={i}::Broken local link: {t}")
          print(f"Total broken local links: {len(broken)}")
          sys.exit(1 if broken else 0)
          PY
          rc=$?
          echo "::endgroup::"
          exit $rc

      # ----------------------------------------------------------------------
      # Rule 3: Bare-emoji table cell (Mickey)
      # Lightweight regex: table cell containing only whitespace + emoji +
      # whitespace, no alphanumerics. False positives expected; tune down.
      # HARD-FAIL since Wave 5 (Babu mega-sweep): docs-bare-emoji-sweep
      # complete for in-scope tables. Out-of-scope dirs excluded.
      # ----------------------------------------------------------------------
      - name: Bare-emoji table cell
        id: bare-emoji
        run: |
          set +e
          echo "::group::Bare-emoji table cell scan"
          HITS=$(grep -rn --include='*.md' \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=.smith \
            --exclude-dir=bin \
            --exclude-dir=obj \
            --exclude-dir=archive \
            --exclude-dir=perf \
            --exclude-dir=benchmarks \
            --exclude-dir=demos \
            --exclude-dir=launch \
            --exclude-dir=announce \
            --exclude-dir=talks \
            --exclude-dir=audits \
            --exclude=README.md \
            --exclude=CHANGELOG.md \
            -P '\|\s*[\x{1F300}-\x{1FAFF}\x{2600}-\x{27BF}\x{2700}-\x{27BF}\x{1F000}-\x{1F2FF}]+\s*\|' . || true)
          if [ -n "$HITS" ]; then
            COUNT=$(printf '%s\n' "$HITS" | wc -l)
            echo "::error title=Bare emoji in table::$COUNT cell(s) contain only an emoji"
            printf '%s\n' "$HITS" | while IFS= read -r line; do
              file=$(printf '%s' "$line" | cut -d: -f1)
              lineno=$(printf '%s' "$line" | cut -d: -f2)
              echo "::error file=${file#./},line=${lineno}::Bare emoji in table cell -- add a text label (accessibility)"
            done
            echo "::endgroup::"
            exit 1
          else
            echo "Clean: no bare-emoji table cells."
          fi
          echo "::endgroup::"

      # ----------------------------------------------------------------------
      # markdownlint-cli2 — standard hygiene (warn-only on first run).
      # TODO(soup-nazi): flip continue-on-error to false once baseline is clean.
      # ----------------------------------------------------------------------
      - name: markdownlint-cli2 (warn-only)
        id: markdownlint
        continue-on-error: true
        run: |
          npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#.git" "#.smith" "#**/bin/**" "#**/obj/**" "#docs/archive/**" || \
            echo "::warning title=markdownlint::violations found — see log"

      # ----------------------------------------------------------------------
      # Filename convention: kebab-case only under docs/ (excluding known
      # PascalCase/SCREAMING conventions like README.md, ADR-*.md).
      # Warn-only initially.
      # ----------------------------------------------------------------------
      - name: Filename convention — docs/ kebab-case (warn-only)
        continue-on-error: true
        run: |
          set +e
          echo "::group::Filename convention"
          BAD=$(find docs -name '*.md' -type f 2>/dev/null | awk -F/ '{
            name=$NF;
            if (name ~ /^README\.md$/) next;
            if (name ~ /^ADR-/) next;
            if (name ~ /^[a-z0-9]+(-[a-z0-9]+)*\.md$/) next;
            print $0
          }')
          if [ -n "$BAD" ]; then
            printf '%s\n' "$BAD" | while IFS= read -r f; do
              echo "::warning file=${f}::Non-kebab-case filename under docs/ (convention)"
            done
          else
            echo "Clean: all docs/ filenames kebab-case."
          fi
          echo "::endgroup::"

      # ----------------------------------------------------------------------
      # CRLF / tabs in .md — .editorconfig compliance. Fails hard (cheap).
      # ----------------------------------------------------------------------
      - name: .editorconfig — no CRLF, no tabs in *.md
        run: |
          set -e
          echo "::group::CRLF scan"
          CRLF=$(grep -rln --include='*.md' \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=.smith \
            --exclude-dir=bin \
            --exclude-dir=obj \
            $'\r' . || true)
          if [ -n "$CRLF" ]; then
            echo "::error title=CRLF in markdown::Convert to LF"
            printf '%s\n' "$CRLF" | while IFS= read -r f; do
              echo "::error file=${f#./}::CRLF line endings — must be LF"
            done
            exit 1
          fi
          echo "Clean: no CRLF."
          echo "::endgroup::"

      - name: Summary
        if: always()
        run: |
          {
            echo "## docs-lint summary"
            echo ""
            echo "| check | status |"
            echo "|---|---|"
            echo "| smart-quote (hard-fail) | ${{ steps.smart-quotes.outcome }} |"
            echo "| link-check (hard-fail) | ${{ steps.link-check.outcome }} |"
            echo "| bare-emoji (hard-fail) | ${{ steps.bare-emoji.outcome }} |"
            echo "| markdownlint (warn-only) | ${{ steps.markdownlint.outcome }} |"
            echo ""
            echo "Warn-only checks will be flipped to hard-fail once the"
            echo "follow-up sweep todos close. See TODO comments in the"
            echo ".github/workflows/docs-lint.yml for owners."
          } >> "$GITHUB_STEP_SUMMARY"
