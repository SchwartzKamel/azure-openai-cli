          文: |-
            I'm implementing a circuit breaker for external service calls (art, audio, copilot). Here's my plan:

            1. **Create `internal/circuitbreaker/breaker.go`** — A configurable circuit breaker with:
               - Three states: Closed (normal), Open (fail fast), Half-Open (probing)
               - Configurable: `MaxFailures` (consecutive failures to trip), `CooldownDuration` (time before half-open), `HalfOpenSuccesses` (successes needed to close)
               - Thread-safe with `sync.Mutex`
               - An `ErrCircuitOpen` sentinel error for fast-fail
               - A `nowFunc` field for testability (so we can manipulate time in tests)

            2. **Create `internal/circuitbreaker/breaker_test.go`** — Comprehensive tests

            3. **Integrate into `art.Client`** — Add a `*circuitbreaker.Breaker` field, check `Allow()` before `GenerateImage`, record success/failure

            4. **Integrate into `audio.Client`** — Same pattern for `SynthesizeSpeech`

            5. **Integrate into `copilot.Client`** — Wrap the `ChatStream` method. Also wrap the token exchange path.

            Key design decisions:
            - The circuit breaker uses **consecutive failures** (not sliding window) since it's simpler and matches the task description ("N consecutive failures"). The discord bot's existing one uses a sliding window, but that's a different pattern.
            - I'm making it a separate shared package rather than duplicating in each client
            - I'll use `errors.Is(err, circuitbreaker.ErrCircuitOpen)` so callers can detect fast-fail
            - For copilot, I'll apply it at the `Client.ChatStream` level (wrapping the retry loop), not inside the retry loop — so the circuit breaker tracks whether the service is fundamentally down, not individual retry attempts
            - The copilot token exchange will get its own breaker since it's a separate service endpoint

            Does this approach make sense? Any concerns?
