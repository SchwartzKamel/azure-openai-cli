            ## 1. CRITICAL: Flaky Test — `TestReloadIfChanged_DialogueSurvives` (internal/task)
            The test fails intermittently (4 out of 5 runs with `-count=5`). Root cause: `ReloadIfChanged()` uses file mtime to detect changes, but on filesystems with 1-second mtime resolution, two writes within the same second produce the same mtime, causing the reload to be skipped.

