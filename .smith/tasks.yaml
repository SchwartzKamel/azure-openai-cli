          文: |-
            I've made a set of dashboard UI/UX improvements. Here's a summary of changes across 2 files (72 lines added, 50 removed):

            ## Changes Made

            ### 1. Fix malformed HTML attributes in action buttons (dashboard.js)
            **Bug**: All action buttons in `actionBtns()` and `boardActions()` had doubled closing quotes on `data-value` attributes: `data-value="active""` — the extra `"` created malformed HTML that could break event delegation since the `title` attribute would get merged into the value.
            **Fix**: Removed the 8 stray double quotes across both functions.

            ### 2. Add missing CSS variables for Oracle/Legion tabs (dashboard.go)
            **Bug**: The `loadOracle()` and `loadLegion()` functions used CSS variables like `var(--accent)`, `var(--card-bg)`, `var(--border)`, `var(--text-primary)`, `var(--text-secondary)`, `var(--text-dim)`, `var(--success)`, `var(--warning)`, `var(--error)`, `var(--info)` — but none of these were defined anywhere in the dashboard's CSS. This meant Oracle and Legion tabs rendered with broken/invisible text.
            **Fix**: Added all 10 CSS variable definitions to `:root`, using colors consistent with the dark cyberpunk theme.

            ### 3. Fix low-contrast text in diary/art empty states (dashboard.go)
            **Bug**: `text-gray-600` used in diary and art empty states was too dim on the #0a0a1a dark background (~2.8:1 contrast ratio). This was caught by `TestDashboardNoLowContrastText`.
            **Fix**: Changed to `text-gray-500` (acceptable contrast ~4.2:1 on dark).

            ### 4. Fix `text-white` usage (dashboard.go + dashboard.js)
            - Art lightbox close button: `text-white` → `text-gray-200` (consistent with theme)
            - Art gallery thumbnail title: `text-white` → `text-gray-100` (still readable on dark overlay gradient)

            ### 5. Improve toast notification duration (dashboard.js)
            **Before**: All toasts (success, warning, error) auto-dismissed after 2500ms.
            **After**: Success stays 2500ms, warnings 4000ms, errors 5000ms — giving users more time to read important messages.

            ### 6. Refactor Legion tab
