          文: "I've implemented the circuit breaker for external service calls. Here's a summary for your review:\n\n## New Package: `internal/circuitbreaker/circuitbreaker.go`\n\nA reusable, thread-safe circuit breaker with three states (Closed/Open/HalfOpen):\n- **Consecutive failure counting** — after N consecutive failures, trips to Open\n- **Configurable** via `Options`: Threshold (default 5), Cooldown (default 30s), HalfOpenSuccesses (default 2)\n- **Sentinel error** `ErrOpen` — callers can check with `errors.Is(err, circuitbreaker.ErrOpen)`\n- **Testable** — `nowFunc` field allows time manipulation in tests\n- **18 unit tests** with race detection, including full lifecycle test\n\n## Integrations\n\n### `internal/art/client.go`\n- Added `breaker *circuitbreaker.Breaker` field to `Client`\n- `GenerateImage()`: Calls `breaker.Allow()` first (fail-fast), then `RecordFailure()` on HTTP errors/transport errors, `RecordSuccess()` on success\n- `CircuitBreaker()` accessor for diagnostics\n\n### `internal/audio/client.go`  \n- Same pattern as art in `SynthesizeSpeech()`\n\n### `internal/copilot/client.go`\n- `ChatStream()`: `breaker.Allow()` before the retry loop, `RecordFailure()` after all retries exhausted or non-retriable errors, `RecordSuccess()` on successful stream setup\n- Key design: circuit breaker wraps the entire retry loop — if service is consistently failing, don't even start retrying\n\n## Key Design Decisions\n\n1. **Consecutive failures** vs sliding window — simpler, appropriate for service-level health. A success always resets the counter.\n2. **Optional breaker** — nil checks throughout, backward compatible. If somehow breaker is nil, methods work as before.\n3. **Failure extends cooldown** — if failures arrive while open, the `openedAt` timestamp is updated, preventing premature half-open transition during cascading failures.\n4. **Single failure in half-open re-opens** — conservative approach, appropriate for expensive external API calls.\n5. **Copilot**: Records failure only after all retri"
