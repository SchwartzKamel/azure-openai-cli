            I've completed the decomposition of `internal/loop/loop.go`'s `Run()` method. Here's what I did and why — I'd appreciate your review:

            ## Summary
            The `Run()` method was ~600 lines mixing heartbeat writing, task picking, agent execution, stream consumption, stall detection, quality checks, artifact persistence, task status management, dialogue logging, task harvesting, conferral handling, remote pushes, and auto-archiving. I decomposed it into three phase methods:

            ### New Methods
            1. **`runIteration(ctx, ic, i)`** (~185 lines) — Task picking, prompt building, agent execution, stream consumption. Returns an `iterationOutcome` signal.
            2. **`handlePostIteration(ctx, ic, i)`** (~175 lines) — Budget enforcement, stall detection, quality gate, task status management, diary, dialogue, harvest, conferrals, push, archive.
            3. **`persistIterationArtifacts(result)`** (~55 lines) — Spec files (plan mode), per-task plan files, iterations.log.

            ### Supporting Changes
            - **`iterationContext`** struct: Holds per-iteration state (result, activeIdx, pickedTask, directive, qualityPassed, defaultArchName, allArchetypes, agent) that flows between phases.
            - **`iterationSignal`/`iterationOutcome`** types: Enum+struct for phase methods to communicate control flow (continue, skip, return) back to the Run loop without using panic/recover.
            - **`writeIterationLog(result)`**: Extracted the NDJSON iteration log writing that was duplicated in both the error path and the normal path.
            - **`loadPlanSummaries()`**: Promoted from a closure inside Run() to a named method on `*Engine`.

            ### Result
            - `Run()` is now ~135 lines — a readable orchestrator calling three phases in sequence.
            - All 56+ existing tests pass unchanged (59s).
            - Full project builds cleanly (`go build ./...`).
            - No behavioral changes — this is a pure structure-preserving refactor.

            ### Design Decisions I Want Feedback On
            1. **`iterationOutcome` signal pattern vs. Go errors**: I chose a custom signal enum rather than using error sentinels
