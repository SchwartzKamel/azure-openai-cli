        - 者: planner
          文: |-
            I've audited the web dashboard (web/static/app.js, style.css, index.html) and identified these issues to fix in priority order:

            **Critical Issues:**
            1. **Duplicate `escapeHtml` function** - Two versions at lines 590 (DOM-based) and 868 (regex-based). The DOM-based one at 590 is what actually runs (first declaration wins for `function` declarations). But both exist. Need to remove one - the regex-based one at 868 handles null safely, so it's better.

            2. **`alert()` calls** - 5 raw browser `alert()` calls at lines 95, 113, 192, 221, 225. Should be replaced with themed toast notifications.

            3. **Low-contrast `text-gray-600` on dark backgrounds** - 10 instances across app.js and index.html. These are ~2.8:1 contrast ratio on #05050a. Should be `text-gray-500` (~3.9:1) or `text-gray-400` (~5.5:1). Exception: `placeholder:text-gray-600` is fine since it's placeholder text.

            4. **`text-yellow-400` / `text-red-400`** in prompt library scores - not consistent with neon theme colors. Should use `text-neon-yellow` / `text-neon-red`.

            **UX Issues:**
            5. **Scrollbar improvements** - Width only 4px, track transparent, no Firefox support. Need wider (6px), dark track background, Firefox `scrollbar-width`/`scrollbar-color`.

            6. **Missing responsive breakpoints** - Only 768px exists. Need 375px (small phones) and 1024px (tablets).

            7. **Empty states** - Library and exemplar empty states use `text-gray-600`. History sidebar has no empty state. Memory stats initial "Loading..." is `text-gray-600`.

            8. **No toast notification system** - Need to add one for replacing alerts and for WS disconnect/success notifications.

            **Nice-to-haves:**
            9. Loading spinners for library/exemplar fetch failures
            10. Error recovery with retry buttons

            My plan: Fix all 8 items in this iteration, starting with the toast system (since alerts depend on it), then low-contrast fixes, then duplicate escapeHtml, then scrollbar/responsive.

            Does this prioritization make sense? Any concerns?
